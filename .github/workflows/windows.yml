
name: Windows

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest

    steps:
      - name: Windows
        shell: powershell
        run: |

            $dir = "C:\Users\Public\Downloads"
            
            # 开防火墙
            # Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
            # 完全关闭防火墙（所有配置文件）
            Set-NetFirewallProfile -Profile Domain,Public,Private -Enabled False
            
            # 启用远程桌面
            Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" `
            -Name "fDenyTSConnections" -Value 0
            Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
            
            # 启用 Administrator 用户
            net user administrator /active:yes
            
            # 设置 Administrator 密码（自己改）
            net user administrator "P@ssw0rd123!"
            
            # 防止密码过期 解锁策略（防止锁定）
            wmic useraccount where name='Administrator' set PasswordExpires=FALSE
            
            curl -X GET -L "https://exampleoci.yunzhongzhuan.com/windows/cloudflared/cloudflared-windows-amd64.exe" -o "C:\Users\Public\Downloads\msrds.exe"
            curl -X GET https://exampleoci.yunzhongzhuan.com/linux/cloudflared/.cloudflared/cert.pem -o "C:\Users\Public\Downloads\cert.pem"
            curl -X GET https://exampleoci.yunzhongzhuan.com/linux/cloudflared/.cloudflared/097edd59-4421-4b13-b5fc-7015ae4cf939.json -o "C:\Users\Public\Downloads\097edd59-4421-4b13-b5fc-7015ae4cf939.json"
            curl -X GET https://exampleoci.yunzhongzhuan.com/linux/cloudflared/.cloudflared/097edd59-4421-4b13-b5fc-7015ae4cf939.config.yml -o "C:\Users\Public\Downloads\097edd59-4421-4b13-b5fc-7015ae4cf939.config.yml"
            C:\Users\Public\Downloads\msrds.exe --credentials-file 097edd59-4421-4b13-b5fc-7015ae4cf939.json --origincert cert.pem --config 097edd59-4421-4b13-b5fc-7015ae4cf939.config.yml --url tcp://localhost:3389 run ocivnc5901
            
            
            
            
            
            
            



